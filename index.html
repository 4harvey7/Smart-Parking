<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            background-color: #007bff;
            padding: 20px 50px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { margin: 0; font-size: 24px; }
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 50px;
        }
        .hero h2 { font-size: 48px; margin-bottom: 10px; color: #222; }
        .hero p { font-size: 20px; color: #666; margin-bottom: 40px; max-width: 600px; }
        .btn-container { display: flex; gap: 20px; }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-primary { background-color: #007bff; color: white; border: 2px solid #007bff; }
        .btn-primary:hover { background-color: #0056b3; border-color: #0056b3; }
        .btn-outline { background-color: transparent; color: #007bff; border: 2px solid #007bff; }
        .btn-outline:hover { background-color: #007bff; color: white; }
        .footer {
            text-align: center;
            padding: 20px;
            background-color: #e9ecef;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>🚗 Smart Parking</h1>
    </div>

    <div class="hero">
        <h2>Find Your Spot. Instantly.</h2>
        <p>A real-time IoT parking management system designed to save time, reduce emissions, and optimize space utilization.</p>
        <div class="btn-container">
            <a href="login.html" class="btn btn-primary">Login to Dashboard</a>
            <a href="signup.html" class="btn btn-outline">Create Account</a>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 Developed by Rodz Harvey D. Licayan
    </div>

</body>
</html>
