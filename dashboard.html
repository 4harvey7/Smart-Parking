<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 30px; background-color: #f8f9fa; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ccc; padding-bottom: 10px; margin-bottom: 20px;}
        .status-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .slot { padding: 30px; border-radius: 10px; font-weight: bold; color: white; width: 150px; text-align: center; font-size: 18px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: 0.3s; }
        .available { background-color: #28a745; } 
        .occupied { background-color: #dc3545; }  
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h2>🚗 Live Smart Parking Dashboard</h2>
        <div><span style="background: #28a745; color: white; padding: 5px 10px; border-radius: 5px; font-size: 14px;">System Online</span></div>
    </div>

    <h3>Live Parking Status</h3>
    <div class="status-container">
        <div id="slot1-ui" class="slot available">Slot 1<br><br>LOADING...</div>
        <div id="slot2-ui" class="slot available">Slot 2<br><br>LOADING...</div>
    </div>

    <h3>Latest Scan Log</h3>
    <table style="margin-bottom: 30px;">
        <tr>
            <th>RFID UID</th>
            <th>Action / Status</th>
            <th>Time</th>
        </tr>
        <tr>
            <td id="log-uid">Waiting...</td>
            <td id="log-action">Waiting...</td>
            <td id="log-time">Waiting...</td>
        </tr>
    </table>

    <h3>All Access Logs (History)</h3>
    <div style="max-height: 400px; overflow-y: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
        <table id="logsTable">
            <thead style="position: sticky; top: 0; z-index: 1;">
                <tr>
                    <th>RFID UID</th>
                    <th>Action / Status</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="logsBody">
                <tr><td colspan="3" style="text-align:center;">Loading logs from cloud...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // 🚨 YOUR FIREBASE CONFIG 🚨
        const firebaseConfig = {
            apiKey: "AIzaSyATc2QeCvRqLgaeGDcEqC6NCw4Cfid42_U",
            databaseURL: "https://smart-parking-capstone-ee166-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "smart-parking-capstone-ee166",
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. LIVE SLOT MONITORING
        db.ref('slots').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const s1 = document.getElementById('slot1-ui');
                s1.className = data.slot1 === 1 ? 'slot available' : 'slot occupied';
                s1.innerHTML = data.slot1 === 1 ? 'Slot 1<br><br>AVAILABLE' : 'Slot 1<br><br>OCCUPIED';

                const s2 = document.getElementById('slot2-ui');
                s2.className = data.slot2 === 1 ? 'slot available' : 'slot occupied';
                s2.innerHTML = data.slot2 === 1 ? 'Slot 2<br><br>AVAILABLE' : 'Slot 2<br><br>OCCUPIED';
            }
        });

        // 2. LIVE POPUP & LATEST SCAN MONITORING
        let isFirstLoad = true;
        db.ref('latest_scan').on('value', (snapshot) => {
            const scan = snapshot.val();
            
            if (scan) {
                document.getElementById('log-uid').innerText = scan.uid;
                document.getElementById('log-action').innerText = scan.action;
                document.getElementById('log-time').innerText = new Date().toLocaleTimeString();

                if (!isFirstLoad) {
                    let iconType = "info";
                    if(scan.action.includes("Granted")) iconType = "success";
                    if(scan.action.includes("Denied") || scan.action.includes("Unregistered")) iconType = "error";
                    if(scan.action.includes("Full")) iconType = "warning";

                    Swal.fire({
                        title: "Scan Detected!",
                        text: scan.action + " (UID: " + scan.uid + ")",
                        icon: iconType,
                        timer: 4000
                    });
                }
                isFirstLoad = false;
            }
        });

        // 3. FETCH AND DISPLAY ALL HISTORICAL LOGS
        db.ref('logs').on('value', (snapshot) => {
            const tbody = document.getElementById('logsBody');
            tbody.innerHTML = ''; 

            let logsArray = [];

            snapshot.forEach((childSnapshot) => {
                logsArray.push(childSnapshot.val());
            });

            // Put the newest scans at the top
            logsArray.reverse();

            if (logsArray.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">No history found.</td></tr>';
                return;
            }

            logsArray.forEach((log) => {
                const row = `
                    <tr>
                        <td><strong>${log.uid}</strong></td>
                        <td>${log.action}</td>
                        <td>${log.time || 'N/A'}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        });
    </script>
</body>
</html>
