<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Parking Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 30px; background-color: #f8f9fa; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ccc; padding-bottom: 10px; margin-bottom: 20px;}
        .header-controls { display: flex; align-items: center; gap: 15px; }
        .btn-logout { background-color: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s;}
        .btn-logout:hover { background-color: #c82333; }
        .status-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .slot { padding: 30px; border-radius: 10px; font-weight: bold; color: white; width: 150px; text-align: center; font-size: 18px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: 0.3s; }
        .available { background-color: #28a745; } 
        .occupied { background-color: #dc3545; }  
        .table-responsive { width: 100%; overflow-x: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 30px; border-radius: 5px;}
        table { width: 100%; border-collapse: collapse; background: white; min-width: 500px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007bff; color: white; position: sticky; top: 0; z-index: 1;}
        @media (max-width: 600px) {
            body { margin: 15px; }
            .header { flex-direction: column; text-align: center; gap: 15px; }
            .header-controls { flex-direction: column; width: 100%; }
            .btn-logout { width: 100%; }
            .status-container { flex-direction: column; width: 100%; }
            .slot { width: auto; flex: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>🚗 My Parking Dashboard</h2>
        <div class="header-controls">
            <span id="user-greeting" style="font-weight: bold; color: #555;">Authenticating...</span>
            <span style="background: #28a745; color: white; padding: 5px 10px; border-radius: 5px; font-size: 14px;">System Online</span>
            <button id="logout-btn" class="btn-logout">Log Out</button>
        </div>
    </div>

    <h3>Live Parking Status</h3>
    <div class="status-container">
        <div id="slot1-ui" class="slot available">Slot 1<br><br>LOADING...</div>
        <div id="slot2-ui" class="slot available">Slot 2<br><br>LOADING...</div>
    </div>

    <h3>My Latest Scan</h3>
    <div class="table-responsive">
        <table>
            <tr>
                <th>RFID UID</th>
                <th>Action / Status</th>
                <th>Time</th>
            </tr>
            <tr>
                <td id="log-uid">Waiting for your card...</td>
                <td id="log-action">--</td>
                <td id="log-time">--</td>
            </tr>
        </table>
    </div>

    <h3>My Access History</h3>
    <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
        <table id="logsTable">
            <thead>
                <tr>
                    <th>RFID UID</th>
                    <th>Action / Status</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="logsBody">
                <tr><td colspan="3" style="text-align:center;">Loading your history...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // 🚨 YOUR FIREBASE CONFIG 🚨
        const firebaseConfig = {
            apiKey: "AIzaSyATc2QeCvRqLgaeGDcEqC6NCw4Cfid42_U",
            databaseURL: "https://smart-parking-capstone-ee166-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "smart-parking-capstone-ee166",
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUserRfid = null;

        // --- AUTHENTICATION & RFID FETCH ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                // 1. Find the user's specific RFID in the database
                db.ref('users/' + user.uid).once('value').then((snapshot) => {
                    if (snapshot.exists()) {
                        const userData = snapshot.val();
                        currentUserRfid = userData.rfid_id; // GET THE RFID!
                        
                        document.getElementById('user-greeting').innerText = "Hello, " + (userData.fullName || "User");
                        
                        if (!currentUserRfid) {
                            Swal.fire("Warning", "Your account does not have an RFID card linked to it. Please contact the admin.", "warning");
                        } else {
                            // 2. Only load data once we know their RFID
                            loadDashboardData();
                        }
                    } else {
                        document.getElementById('user-greeting').innerText = "Account Error: No Database Profile";
                    }
                });
            } else {
                window.location.href = "login.html";
            }
        });

        // --- LOGOUT BUTTON ---
        document.getElementById('logout-btn').addEventListener('click', () => {
            auth.signOut().then(() => { window.location.href = "login.html"; });
        });

        // --- LOAD SECURE DATA ---
        function loadDashboardData() {
            
            // 1. LIVE SLOTS (Everyone sees the same parking slots)
            db.ref('slots').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    const s1 = document.getElementById('slot1-ui');
                    s1.className = data.slot1 === 1 ? 'slot available' : 'slot occupied';
                    s1.innerHTML = data.slot1 === 1 ? 'Slot 1<br><br>AVAILABLE' : 'Slot 1<br><br>OCCUPIED';

                    const s2 = document.getElementById('slot2-ui');
                    s2.className = data.slot2 === 1 ? 'slot available' : 'slot occupied';
                    s2.innerHTML = data.slot2 === 1 ? 'Slot 2<br><br>AVAILABLE' : 'Slot 2<br><br>OCCUPIED';
                }
            });

            // 2. LIVE POPUP & LATEST SCAN (STRICTLY FILTERED)
            let isFirstLoad = true;
            db.ref('latest_scan').on('value', (snapshot) => {
                const scan = snapshot.val();
                
                // 🚨 ONLY trigger if the scanned UID matches the logged-in user's UID!
                if (scan && scan.uid === currentUserRfid) {
                    document.getElementById('log-uid').innerText = scan.uid;
                    document.getElementById('log-action').innerText = scan.action;
                    document.getElementById('log-time').innerText = scan.time ? scan.time : new Date().toLocaleTimeString();

                    if (!isFirstLoad) {
                        if (scan.action.includes("Granted")) {
                            Swal.fire({
                                title: "Gate Opening! 🟢",
                                text: "A slot is available. You may now enter.",
                                icon: "success",
                                timer: 5000,
                                showConfirmButton: false
                            });
                        } 
                        else if (scan.action.includes("Full")) {
                            Swal.fire({
                                title: "Parking Full 🟡",
                                text: "Sorry, there are no available slots right now.",
                                icon: "warning",
                                confirmButtonText: "Okay"
                            });
                        } 
                    }
                }
                isFirstLoad = false;
            });

            // 3. ALL ACCESS LOGS (STRICTLY FILTERED)
            db.ref('logs').on('value', (snapshot) => {
                const tbody = document.getElementById('logsBody');
                tbody.innerHTML = ''; 

                let logsArray = [];

                snapshot.forEach((childSnapshot) => {
                    const log = childSnapshot.val();
                    // 🚨 ONLY push to array if the log belongs to this user!
                    if (log.uid === currentUserRfid) {
                        logsArray.push(log);
                    }
                });

                logsArray.reverse(); // Newest first

                if (logsArray.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">No history found for your card.</td></tr>';
                    return;
                }

                logsArray.forEach((log) => {
                    const row = `
                        <tr>
                            <td><strong>${log.uid}</strong></td>
                            <td>${log.action}</td>
                            <td>${log.time || 'N/A'}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            });
        }
    </script>
</body>
</html>
